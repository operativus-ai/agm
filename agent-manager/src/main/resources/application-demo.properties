# ===== Demo profile =====
# Provides demo-tier config tweaks (e.g. encryption-key passthrough). The demo SEED
# DATA (DEMO_ACME / DEMO_GLOBEX orgs, demo users, agents, runs, ...) is multi-org and
# ships only in the enterprise distribution (agm-enterprise jar,
# db/changelog/ext/demo-*.sql, context:"demo"). In a Core-only deployment this
# profile changes configuration but seeds nothing.
#
# Activate with one of:
#   SPRING_PROFILES_ACTIVE=demo ./mvnw spring-boot:run
#   ./mvnw spring-boot:run -Dspring-boot.run.profiles=demo
#
# Seeding demo data (enterprise app, explicit — never on plain boot):
#   run the enterprise app once with spring.liquibase.contexts=demo
# Wiping demo data: run the enterprise jar's
#   db/changelog/changes/demo/demo-099-wipe.sql manually (context:"demo_wipe" —
#   deliberately kept OFF every changelog include path).
#
# Why on-boot seeding is OFF: scheduled-execution rows in the demo schedules target
# agents using OpenAI / Gemini models. Without provider_credentials rows configured
# for DEMO_ACME / DEMO_GLOBEX, the ScheduleExecutionPoller logs an
# IllegalArgumentException every tick. Seeding explicitly keeps the demo data path
# available without polluting logs on every boot.

# Demo is a dev-tier env that is expected to boot without a real encryption key.
# Opt in explicitly to PASSTHROUGH so the boot-time fail-fast gate in
# OutboundApiKeyConverter (Bug #34 fix) does not block the demo.
# NEVER set this on a production-shaped profile.
agm.security.outbound-key-encryption.allow-passthrough=true

# Enable the selector-driven ROUTER step so the demo Expense Approval workflow
# (demo-015-workflows.sql) actually pauses at its HITL approve/reject gate. With
# this off (the global default), a ROUTER step demotes to plain AGENT behavior
# and the human-decision branch never fires. Demo-scoped only.
agm.workflow.router.enabled=true

# Demo-only HS256 JWT signing secret. Distinct from dev so demo tokens cannot
# cross-validate against a dev environment. NEVER use this in prod — prod profile
# requires the JWT_SECRET env var. Generate prod keys with: openssl rand -base64 32
agentmanager.app.jwtSecret=demo-only-jwt-secret-do-not-use-in-production-min-32-bytes-required
