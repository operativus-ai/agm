# Write-time SSRF guard for extension URLs (ExtensionController). When false (default, secure),
# loopback / RFC-1918 / site-local / cloud-metadata URLs are rejected with 400 at registration.
# Set true ONLY in dev/test profiles where webhook fixtures target a local server — never in prod.
agm.extensions.ssrf.allow-loopback=false
