spring.application.name=agent-manager
spring.threads.virtual.enabled=true
spring.config.import=optional:file:.env[.properties]

# Jackson — Spring Boot 4 ships Jackson 3.x which flipped FAIL_ON_NULL_FOR_PRIMITIVES
# from false (the Jackson 2.x default) to true. That breaks @RequestBody deserialization
# for any record/POJO with primitive fields where the caller sends a JSON null
# (e.g. POST /api/admin/agents with AgentDefinition.isTeam = null). Restore the
# Jackson 2.x behavior: null on a primitive falls back to the type's default (false
# for boolean, 0 for numeric). Affects request-body deserialization globally.
spring.jackson.deserialization.fail-on-null-for-primitives=false

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/agent_manager
spring.datasource.username=admin
spring.datasource.password=${DB_PASSWORD:changeme}
spring.jpa.hibernate.ddl-auto=validate
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
# Default Liquibase runtime context. Excludes demo/seed changesets on every normal boot
# (dev/test/prod). IMPORTANT: Liquibase 5's `contexts` is a POSITIVE match-list, NOT a boolean
# filter, and SpringLiquibase exposes no setContextFilter — so the old `!demo and !demo-wipe`
# negation was silently ignored and demo data (agents/jobs/users) loaded on every boot, incl.
# prod (surfaced by the 2026-06-17 prod-stack dry-run). Mechanism: untagged "main" changesets
# always run regardless of this value; the demo changesets are tagged context:"demo"/"demo_wipe"
# and run ONLY when the runtime contexts include them. Setting a positive token here that no main
# changeset carries therefore excludes demo by default. Seed demo data explicitly via:
#   ./mvnw liquibase:update -Dliquibase.contexts=demo        (see application-demo.properties)
# Pinned by LiquibaseDemoContextExclusionRuntimeTest.
spring.liquibase.contexts=app
# Liquibase per-changeset MD5 checksums are the immutability guarantee for the
# changelog: editing an applied changeset triggers a "Validation Failed" boot
# error. Default (false) is intentional. If a Liquibase library upgrade ever
# requires a one-time checksum recompute, set clear-checksums=true behind a
# profile, run once, then unset — never leave it on globally.

# Redis Cache
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.redis.key-prefix=agent-manager:
spring.cache.redis.use-key-prefix=true
# Default cache entry TTL. 24h matches the baseline SRE tunable for static agent config
# (see CacheConfig). Override per-environment (e.g. PT1H for dev) or per-integration-test
# (PT2S) without touching code. ISO-8601 duration format.
spring.cache.redis.time-to-live=PT24H

# McpClusterEventListener Redis PubSub container. Gates the RedisMessageListenerContainer
# @Bean that subscribes to extension:registered / extension:deleted for cluster-wide MCP
# connection sync. Disabled by default (local dev has no Redis). Enable in production
# deployments via env var AGM_MCP_CLUSTER_EVENTS_ENABLED=true or an overlay properties file.
agm.mcp.cluster-events.enabled=false

# Spring AI — provider keys come from DB only (provider_credentials table + ModelEntity.apiKey override).
# DynamicProviderInitializer injects literal dummy keys before bean creation so Spring AI's eager
# validation passes; the dummy values are NEVER used at call time — see AbstractDynamicModelProvider.resolveApiKey.
# The chat/embedding-model defaults below are inert — every agent run constructs its ChatModel from
# the ModelEntity row, not from these properties.
spring.ai.google.genai.project-id=${GOOGLE_PROJECT_ID:unused}
spring.ai.google.genai.embedding.project-id=${spring.ai.google.genai.project-id}
spring.ai.google.genai.embedding.location=us-central1
spring.ai.google.genai.embedding.text.options.model=text-embedding-004

# OpenAI Configuration — embedding/moderation auto-config disabled (we build embedding models per ModelEntity).
spring.ai.openai.embedding.enabled=false
spring.ai.openai.moderation.enabled=false

# LiteLLM gateway — OpenAI-compatible proxy in front of 100+ models. A model row with
# provider=LITELLM reaches the proxy here (per-model baseUrl override still wins). The API key is
# DB-only (per-org LITELLM provider credential = the LiteLLM master key, or a per-model override).
agm.providers.litellm.base-url=http://localhost:4000

# Anthropic Configuration — embedding auto-config disabled.
spring.ai.anthropic.embedding.enabled=false

# Vector Store
# Disable Spring AI init since Liquibase handles it
spring.ai.vectorstore.pgvector.initialize-schema=false
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.dimension=768
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE

# Logging
logging.file.name=/tmp/agm.log
logging.level.com.operativus.agentmanager=DEBUG
logging.level.org.springframework.ai=DEBUG
# Spring AI logs NoSuchElementException at ERROR inside MessageAggregator before propagating;
# our onErrorResume in AgentStreamManager already handles this known upstream bug gracefully.
logging.level.org.springframework.ai.chat.model.MessageAggregator=OFF
# Tool-call content preview gate. MUST default to false — tool inputs can contain PII
# (emails, names, account IDs) and running PII scrubbing per log line is architecturally
# infeasible (see logging plan Risk R-7). Enable only in dev/staging when actively debugging.
agentmanager.logging.tool-content=false

# Media URL fetch caps (MediaUrlFetcher). Apply to media inputs supplied as URLs on
# /api/agents/{id}/runs* and /api/runs*. The earlier path constructed a UrlResource
# that Spring AI would later eagerly fetch with no caps — an authenticated tenant
# could DoS the host by supplying a slow-loris or multi-GB URL. These limits cap
# the blast radius. Base64-inline payloads bypass the fetcher entirely.
agentmanager.media.connect-timeout-ms=5000
agentmanager.media.read-timeout-ms=30000
# 10 MiB default. Multimodal LLM image inputs are typically 1–5 MiB; raise only if
# a use case justifies it. PDF/document inputs that need larger payloads should go
# through the knowledge-ingestion pipeline, not inline media.
agentmanager.media.max-bytes=10485760

# Observability & Tracing
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=always
management.prometheus.metrics.enabled=true
spring.ai.chat.client.observations.include-prompts=true
spring.ai.chat.client.observations.include-completion=true

# Background-job queue-depth gauge (observability plan T036).
# Sampler in BackgroundJobQueueDepthGauge runs at this cadence and updates
# the cached per-status counts that back agm.observability.bgjob.queue_depth.
# Lower = fresher metric, more DB load. 30s matches the typical Prometheus
# scrape interval so we don't waste DB calls between scrapes.
agm.observability.bgjob.queue-depth.refresh-ms=30000

# Micrometer Context Propagation (Virtual Thread MDC safety)
management.tracing.propagation.type=w3c
management.observations.annotations.enabled=true

# Web Configuration
spring.main.web-application-type=servlet

# Docker Compose — disabled to avoid path resolution issues across IDE/Maven working directories
spring.docker.compose.enabled=false

# Security Configuration
spring.security.oauth2.resourceserver.jwt.issuer-uri=${JWT_ISSUER_URI:https://your-auth-server}
# BCrypt work factor for password hashing. 12 matches OWASP 2024+ guidance
# (~250 ms per hash on modest hardware). Spring's no-arg default is 10 (~50 ms)
# which is below current minimums. Range 4–31; below 4 disables hashing. Test
# profile drops to 4 to keep auth-touching integration tests fast.
agentmanager.security.bcrypt-strength=12

# ─── First-admin bootstrap ───
# Creates ONE admin account at startup so a fresh deployment doesn't need manual
# SQL role promotion (self-registration only ever grants ROLE_USER, and LLM keys
# are admin-gated). DISABLED by default — enable for the very first boot, set the
# three credentials, then set enabled=false again. Idempotent: skips if a user
# with that username or email already exists. Enabling it with a blank username /
# email / password (or an invalid role) fails startup on purpose.
# The created admin is stamped with org-id (unlike public self-registration, which
# leaves org_id null). Role defaults to the cross-tenant platform tier.
agentmanager.bootstrap.admin.enabled=${ADMIN_BOOTSTRAP_ENABLED:false}
agentmanager.bootstrap.admin.username=${ADMIN_BOOTSTRAP_USERNAME:}
agentmanager.bootstrap.admin.email=${ADMIN_BOOTSTRAP_EMAIL:}
agentmanager.bootstrap.admin.password=${ADMIN_BOOTSTRAP_PASSWORD:}
agentmanager.bootstrap.admin.org-id=${ADMIN_BOOTSTRAP_ORG_ID:DEFAULT_SYSTEM_ORG}
agentmanager.bootstrap.admin.role=${ADMIN_BOOTSTRAP_ROLE:ROLE_SUPER_ADMIN}

# ─── Outbound email (self-serve password reset, future notifications) ───
# Production must set SMTP_HOST / SMTP_PORT / SMTP_USERNAME / SMTP_PASSWORD as
# env vars (or override these property values directly). Defaults below point at
# a deliberately-unreachable host so a misconfigured deployment fails fast on
# send rather than silently dropping mail.
spring.mail.host=${SMTP_HOST:smtp.invalid}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
# Connection + read timeouts so an unreachable SMTP server doesn't pin a
# request thread for the JVM-default ~5 minutes.
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# From-address used for password reset (and any future) emails. SES/SendGrid/
# Postmark require this to be a verified sender domain in production.
agentmanager.mail.from-address=${MAIL_FROM_ADDRESS:noreply@example.com}
agentmanager.mail.product-name=${MAIL_PRODUCT_NAME:Agent Manager}

# ─── Self-serve password reset (Phase 1 #7) ───
# Token TTL — short on purpose. 15 min is long enough for a user to switch tabs
# and click the email link, short enough that a stolen-but-unused token has a
# narrow window.
agentmanager.password-reset.token-ttl-minutes=15
# Per-user request budget within a 60-min window. Caps damage from a compromised
# inbox spamming reset requests to lock a victim out.
agentmanager.password-reset.rate-limit-per-hour=5

# Public-facing base URL the reset email links into. Production must set this to
# the actual FE-served domain (https://app.example.com); reset emails embed
# {public-url}/reset-password?token=... links that must resolve to the SPA's
# reset-confirm screen.
agentmanager.app.public-url=${APP_PUBLIC_URL:http://localhost:3000}

# Web Crawler
app.crawler.max-workers=2
app.firecrawl.baseUrl=http://localhost:3002
# Bulk-crawl polling bounds (WebsiteCrawlerService.crawlSiteBlocking). The crawl runs as a tracked
# WEBSITE_CRAWL background job; these cap how long/often it polls Firecrawl for completion.
app.firecrawl.crawl.poll-interval-ms=5000
app.firecrawl.crawl.timeout-seconds=900

# ─── RAG semantic-search retrieval knobs (KnowledgeService.search) ───
# top-k: candidate documents pulled per semantic search. similarity-threshold: minimum cosine
# similarity [0.0-1.0]; chunks below it are dropped from the LLM context.
# The 0.4 default is data-backed (eval 2026-07-04, text-embedding-3-small over 5 distinct-topic
# docs): on-topic matches scored 0.74-0.81, off-topic noise 0.27-0.37 — a clean non-overlapping
# gap. 0.4 is the lowest round value that clears the observed noise ceiling (0.37) while sitting
# well below the relevant floor (0.74), leaving headroom for weaker-but-real matches. Set 0.0 for
# accept-all (never drop on the retrieval side); raise toward 0.5 for stricter precision.
# SRE-tunable per the property-externalization convention.
agent.rag.search.top-k=4
agent.rag.search.similarity-threshold=0.4

# RAG reranker (default OFF). When true, AdvancedRagAdvisor refines the RRF-ordered candidate pool
# down to topK via an LLM bulk-scoring pass (LlmDocumentReRanker) instead of just taking RRF's top N.
# Scores all candidates in ONE prompt -> JSON [{index,score}] -> sort; fail-open to RRF order. Uses
# the agent's own resolved ChatModel for scoring (a dedicated cheap rerank model is a future knob).
# Cost: +1 LLM call per RAG query. Leave OFF unless a benchmark/tenant justifies the latency + spend.
agent.rag.reranker.enabled=false

# ─── §22.6 A2A outbound API key rotation (encryption at rest) ───
# OutboundApiKeyConverter supports two input shapes for its encryption key material:
#   (a) Legacy single key — still honored for back-compat with existing deployments:
#         agm.security.outbound-key-encryption-key=<base64 32 bytes>
#   (b) Versioned map (for rotation) — preferred. Multiple versions live side-by-side
#         so old rows remain decryptable while new rows encrypt under the active key.
#         agm.security.outbound-key-encryption.keys=1:<b64>,2:<b64>,...
#         agm.security.outbound-key-encryption.active-version=<N>
# Rotation flow: add a new version to `keys`, flip `active-version`, restart the app.
# On the next scheduled fire of OutboundApiKeyMigrationService, rows whose
# `a2a_remote_agents.key_version` differs from active will be re-encrypted under the
# active key. When all rows report the active version the old key can be retired.
# Generate a key with: openssl rand -base64 32
agm.security.outbound-key-rotation.enabled=false
agm.security.outbound-key-rotation.cron=0 0 3 * * SUN

# Multi-Agent Orchestration Limits
agent.orchestration.max-turns=5
agent.orchestration.max-concurrent-calls=10

# Context Compression Optimization
agent.orchestration.compression.enabled=true
agent.orchestration.compression.threshold-chars=8000
agent.orchestration.compression.mode=FAST_LLM
agent.orchestration.compression.fast-model-id=gemini-2.5-flash

# RAG Re-Ranking Configuration removed pre-launch — LlmDocumentReRanker was
# enabled=false by default and never flipped on. AdvancedRagAdvisor now uses
# PassthroughDocumentReRanker (returns first topN documents in retrieval order).
# When real LLM-backed reranking is justified, reintroduce config keys here.

# DuckDuckGo Web Search Tool. Override the base URL when routing through a corporate
# proxy or self-hosted DDG mirror. Default is the public html.duckduckgo.com endpoint.
agent.tools.duckduckgo.base-url=https://html.duckduckgo.com/html/

# Yahoo Finance Stock Lookup Tool. Override for a corporate proxy or alternate quote
# host. Default is the public finance.yahoo.com /quote/ endpoint.
agent.tools.yahoo-finance.base-url=https://finance.yahoo.com/quote/

# E2B Remote Code Sandbox Tool (T1.2). Empty key disables the tool with a domain-exception.
agent.tools.e2b.api-key=${E2B_API_KEY:}
agent.tools.e2b.base-url=https://api.e2b.dev

# Composio Dynamic Tool Adapter (R1.2). Empty key disables the adapter (zero callbacks
# registered + INFO-log on startup). Per-org connection IDs configured as
# agent.tools.composio.connection-ids.<orgId>=<connectionId> entries.
# Auth header is X-API-Key (NOT Bearer) per Phase 0 T001 verdict; base URL is
# backend.composio.dev (NOT api.composio.dev). max-actions=50 hard cap, warn-actions-threshold=25
# soft cap (per audit Finding 11). Circuit breaker opens after 5 failures, OPEN for 30s.
agent.tools.composio.api-key=${COMPOSIO_API_KEY:}
agent.tools.composio.base-url=https://backend.composio.dev
agent.tools.composio.enabled-actions=GMAIL_SEND_EMAIL,GMAIL_FETCH_EMAILS,SLACK_SENDS_A_MESSAGE_TO_A_SLACK_CHANNEL,SLACK_LIST_ALL_USERS,GITHUB_CREATE_AN_ISSUE,GITHUB_SEARCH_ISSUES_AND_PULL_REQUESTS,GITHUB_LIST_REPOSITORIES_FOR_THE_AUTHENTICATED_USER,GOOGLECALENDAR_CREATE_EVENT,GOOGLECALENDAR_FIND_EVENT,LINEAR_LIST_ISSUES,LINEAR_CREATE_ISSUE,JIRA_SEARCH_ISSUES_USING_JQL,NOTION_CREATE_PAGE,NOTION_QUERY_DATABASE,BRAVESEARCH_BRAVE_SEARCH
agent.tools.composio.tier-1-actions=GMAIL_FETCH_EMAILS,SLACK_LIST_ALL_USERS,GITHUB_SEARCH_ISSUES_AND_PULL_REQUESTS,GITHUB_LIST_REPOSITORIES_FOR_THE_AUTHENTICATED_USER,GOOGLECALENDAR_FIND_EVENT,LINEAR_LIST_ISSUES,JIRA_SEARCH_ISSUES_USING_JQL,NOTION_QUERY_DATABASE,BRAVESEARCH_BRAVE_SEARCH
agent.tools.composio.tier-3-actions=
agent.tools.composio.max-actions=50
agent.tools.composio.warn-actions-threshold=25
agent.tools.composio.circuit-breaker.failure-rate-threshold=50
agent.tools.composio.circuit-breaker.minimum-number-of-calls=5
agent.tools.composio.circuit-breaker.wait-duration-in-open-state-seconds=30
agent.tools.composio.circuit-breaker.sliding-window-size=20
# Slow-call protection: opens the breaker when ≥X% of recent calls exceed the slow-call duration.
# Latency spikes (Composio backend slow-but-healthy) burn pool capacity until pending-acquire
# timeouts cascade into failures; this trips the breaker proactively before that happens.
agent.tools.composio.circuit-breaker.slow-call-rate-threshold=80
agent.tools.composio.circuit-breaker.slow-call-duration-seconds=30

# Structured Output Retry Guardrails
agent.guardrails.structured-output.max-retries=3

# LLM Provider Circuit Breaker (per-provider Resilience4j breaker, grouped by model prefix).
# Defaults match the pre-externalisation hardcoded values. Tuned down in application-test
# properties so transition tests (CLOSED -> OPEN -> HALF_OPEN) don't pay a 30s wall-clock
# cost per case.
agent.guardrails.circuit-breaker.failure-rate-threshold=50
agent.guardrails.circuit-breaker.sliding-window-size=10
agent.guardrails.circuit-breaker.minimum-number-of-calls=3
agent.guardrails.circuit-breaker.wait-duration-open-ms=30000
agent.guardrails.circuit-breaker.permitted-calls-half-open=2
agent.guardrails.circuit-breaker.slow-call-duration-ms=60000
agent.guardrails.circuit-breaker.slow-call-rate-threshold=80

# API Rate Limiting (per-user, per-second)
app.rate-limit.requests-per-second=50
app.rate-limit.timeout-millis=0
# Bound on distinct principals held in RateLimiterRegistry. LRU-evicted on overflow so
# long-running JVMs with many service accounts / bot users don't grow the registry forever.
app.rate-limit.max-tracked-users=10000
# POST /api/auth/login per-IP cap. Login is in the permitAll allowlist so unauthenticated
# brute-force attempts arrive here; this bucket prevents audit-table DoS from LOGIN_FAILURE
# row floods and bounds online password attacks. Default 10/min — well above legitimate
# interactive use. Tune up for shared NAT / corporate proxies if needed.
app.rate-limit.login.requests-per-minute=10
# Universal-dispatch endpoints (POST /api/runs and /api/runs/stream) — stricter per-user
# bucket layered on top of the global 50/sec cap. Each dispatch may invoke the LLM
# classifier (billable) and then run the resolved agent, so the worst-case cost
# amplification is much higher than a typical /api/* request. Default 60/min — normal
# interactive use is well below; bots get throttled with 429 + Retry-After: 60.
app.rate-limit.dispatch.requests-per-minute=60
# POST /api/auth/register per-IP cap. Both /register and /login are in the permitAll
# allowlist; without a bucket here, an attacker can spam the endpoint to create unbounded
# garbage users + flood the audit table (every attempt writes a row). PR #1023 collapsed
# the response body to defeat body-based enumeration, but rate limiting bounds the attack
# rate. Default 5/min — real users typically register once; bots get throttled with
# 429 + Retry-After: 60. Tighter than login (10/min) because each register write costs more.
app.rate-limit.register.requests-per-minute=5

# Data Retention Policies (days before auto-purge)
app.retention.sessions-days=90
app.retention.runs-days=180
app.retention.audit-days=365
app.retention.alerts-days=30

# Default Model Resolution (SSOT - overridable via DB global_settings)
agentmanager.models.default.router=gemini-2.5-flash
agentmanager.models.default.heavy=gemini-2.5-pro
agentmanager.models.default.embedding=text-embedding-004

# ─── Scheduler Intervals (milliseconds) ─────────────────────────
# Externalized so SREs can adjust during incident response or load tuning.
agentmanager.scheduler.approval-sla-check-ms=900000
agentmanager.scheduler.approval-cleanup-ms=3600000
# Stuck-PAUSED run sweep: hourly fire, cancel runs PAUSED past the cutoff.
# Mirrors approval-cleanup but on the run side — see RunExecutionManager.expireStuckPausedRuns.
agentmanager.scheduler.run-paused-cleanup-ms=3600000
agentmanager.scheduler.run-paused-cutoff-hours=24

# ─── HITL FinOps cost-approval gate ─────────────────────────────
# When enabled, invoking any tool named in agm.hitl.finops.tools pauses the run for a
# TIER_2_FINOPS_BLOCK (human cost-approval) via HitlAdvisor. Default OFF — per-action cost
# approval is opt-in; cost is otherwise bounded org-wide by DailySpendService.enforceOrgDailyCap.
# The list is pre-seeded with bulkIngestDocumentationSite (unbounded full-site crawl + bulk
# embedding), so flipping agm.hitl.finops.enabled=true is all an operator needs to gate it.
agm.hitl.finops.enabled=false
agm.hitl.finops.tools=bulkIngestDocumentationSite

# DAG workflow engine (REQ-DR-5) — the DEFAULT dispatch path. When a workflow has explicit
# workflow_edges, executeWorkflowAsync delegates to the DagWorkflowExecutor frontier scheduler
# (real fan-out/fan-in, port routing, frontier pause/resume incl. nested sub-workflows).
# Edge-less workflows always take the flat step_order loop, so legacy/linear workflows are
# unaffected; drawing edges in the graph editor is what opts a workflow into the DAG engine.
# Set false only as an emergency opt-out for NEW dispatches — runs already paused with a
# dag_frontier always resume via the DAG path (flat-replaying them would corrupt the graph).
# max-parallelism bounds concurrent node branches per run.
agm.workflow.dag.enabled=true
agm.workflow.dag.max-parallelism=8
# Per-node resilience defaults. A node whose executor returns failure is retried up to
# default-node-max-attempts (1 = no retry) with a fixed default-node-retry-backoff-ms delay; each
# attempt is bounded by default-node-timeout-ms (0 = unbounded). paused/stop/success outcomes are
# never retried. A workflow_step may override any of these per node (retry_max_attempts /
# retry_backoff_ms / timeout_ms columns). Defaults below preserve the prior "run once, no timeout"
# behaviour — raise them to harden flaky agent/webhook nodes against transient failures.
agm.workflow.dag.default-node-max-attempts=1
agm.workflow.dag.default-node-retry-backoff-ms=0
agm.workflow.dag.default-node-timeout-ms=0

# Stuck workflow-run sweepers: cancel RUNNING orphans on startup, cancel PAUSED runs past cutoff hourly.
agentmanager.scheduler.workflow-run-paused-cleanup-ms=3600000
agentmanager.scheduler.workflow-run-paused-cutoff-hours=24
agentmanager.scheduler.workflow-run-running-cutoff-hours=2
agentmanager.scheduler.batch-poll-ms=30000
agentmanager.scheduler.schedule-poll-ms=60000
# Sync RUNNING schedule_runs backed by a workflow_run to terminal status once the workflow settles.
agentmanager.scheduler.workflow-schedule-run-sync-ms=60000
agentmanager.scheduler.memory-consolidation-ms=5000
agentmanager.scheduler.swarm-cleanup-ms=900000
agentmanager.scheduler.peer-health-ms=120000
agentmanager.scheduler.alerting-ms=60000
agentmanager.scheduler.alerts-retry-ms=10000

# ─── Alert Integration Webhook Retry ─────────────────────────────
# Exponential backoff for failed webhook dispatches. retry_count advances until
# max-attempts is reached; base * 2^(n-1) seconds, capped at max-delay-seconds.
agentmanager.alerts.retry.max-attempts=5
agentmanager.alerts.retry.base-delay-seconds=2
agentmanager.alerts.retry.max-delay-seconds=300

# ─── Distributed per-model rate limiting (A5) ────────────────────
# Default OFF — per-model RPM enforcement stays JVM-local via Resilience4j.
# Flip ON to use Redis-backed fixed-window counters so the configured rpm
# holds globally across all replicas. On Redis unreachability the guard
# falls back to the JVM-local Resilience4j gate (fail-OPEN), so customer
# SLO is preserved during Redis outages.
# See docs/plans/agm-a5-distributed-rate-limit.md.
agentmanager.rate-limit.distributed-model.enabled=false

# ─── Tuneable Business Thresholds ────────────────────────────────
# These vary by domain, compliance requirements, or cost tolerance.
agentmanager.slo.latency-p99-target-ms=30000
agentmanager.slo.success-rate-target=0.95
agentmanager.scoring.semantic-passing-threshold=0.85
agentmanager.hallucination.risk-threshold=0.7
agentmanager.finops.anomaly-multiplier=5.0
agentmanager.finops.default-baseline-usd-per-hour=1.00
agentmanager.finops.average-cost-per-run-usd=0.08
agentmanager.finops.valuation-refresh-ms=300000
# JVM-wide default session ceiling (USD). Applies to /api/agents/{id}/run and /stream
# paths where AgentContextHolder.CONTEXT is unbound. The OBO gateway path's per-request
# remainingBudget always takes precedence over this property when bound.
# Commented out (null) by default → no enforcement on the primary path. Operators
# OPT IN by uncommenting and setting a value once they've observed real burn rates
# via the finops.agent.burn_rate.* metrics activated in PR #308.
# GenAiMetricsAdvisor logs an INFO line on boot announcing ENABLED/DISABLED state.
# agentmanager.finops.default-session-ceiling-usd=10.00
# Org DAILY spend cap (USD), enforced as a preflight admission gate in AgentService.run
# (DailySpendService). When today's (UTC calendar-day) org spend reaches the cap, the next run
# is rejected with HTTP 402 BEFORE any provider token — complementing the mid-flight per-session
# ceiling above. Commented out (null) by default → no daily enforcement. Global default for all
# orgs; per-org overrides are a follow-up (no organizations table to scope a column on yet).
# agentmanager.finops.org-daily-cap-usd=100.00
agentmanager.a2a.max-registry-size=500

# ─── Application Metadata ────────────────────────────────────────
agentmanager.version=1.0.0

# ─── REST contract — Spring Data Web pagination ──────────────────
# Spring Boot 4 default Page<T> JSON shape is {content, page: {size, number,
# totalElements, totalPages}}. The frontend interface PaginatedResponse<T>
# (agent-manager-ui/src/shared/types/api.ts) consumes that nested shape.
# PaginationContractTest asserts the shape directly so a future Spring default
# flip surfaces as a test failure rather than a silent UI break.

# AGM Logging Plan §5.17 — SSE run-event stream (RunEventSseController)
# Poll cadence and emitter timeout for /api/v1/runs/{runId}/events. Shorter poll
# interval → lower perceived latency but more DB queries per idle stream. Emitter
# timeout caps how long a single SSE connection may stay open before the server
# auto-closes it; clients reconnect with sinceId=<last event id> to resume.
agent.run.events.sse.poll-interval-ms=500
agent.run.events.sse.emitter-timeout-ms=1800000

# Live-transport: Postgres LISTEN/NOTIFY (AgentRunEventNotifier). The trg_agent_run_events_notify
# trigger fires a NOTIFY on insert; the notifier wakes the matching SSE pumps so delivery is
# event-driven and the poll-interval above becomes a max-staleness safety net rather than the
# primary cadence. If the listener is down, streams transparently fall back to that poll interval.
# heartbeat-ms: how long the LISTEN loop blocks for notifications before looping (and the cadence at
# which a dropped LISTEN connection is detected). reconnect-backoff-ms: pause before re-LISTEN after
# the connection is lost.
agent.run.events.notify.heartbeat-ms=5000
agent.run.events.notify.reconnect-backoff-ms=2000

# Producer-side gate for the HIGH-VOLUME "granular" run-event tier (per-LLM-call, per-tool-call,
# delegation/handoff/orchestrator/task traces). true (default) preserves current behavior. Set false
# to suppress those events at the source in AgentRunEventBus — no agent_run_events insert, no NOTIFY,
# and therefore no SSE replay/fan-out — eliminating most event-streaming overhead. The lifecycle tier
# (RUN_START/COMPLETE/FAILED/PAUSED/CANCELLED/BUDGET_EXCEEDED) is ALWAYS emitted regardless, so run
# status, audit, HITL, and budget enforcement are unaffected. Resolved once per run and bound onto
# AgentContextHolder.emitGranularEvents (AgentService.run); out-of-run-scope emissions use this default.
agm.events.granular-streaming.enabled=true

# OBS-T005: SSE short-lived token store. Three impls are wired via @ConditionalOnProperty:
#   caffeine — single-node in-memory; default for dev/local. No extra infra.
#   redis    — production preferred for multi-node deployments; uses spring-boot-starter-data-redis.
#              Set spring.data.redis.url alongside this.
#   postgres — cluster fallback when Redis is unavailable. Uses the sse_tokens table
#              (Liquibase changeset 039); DataRetentionService GCs expired rows.
# token.ttl-seconds is the wall-clock window from issuance to expiry. Browser EventSource
# typically opens within ~1s of fetching the token; 60s leaves headroom for slow networks
# while keeping the replay window for a leaked token small.
agm.sse.token-store=caffeine
agm.sse.token.ttl-seconds=60

# REQ-DR-3 Skills system feature flag. When false (default), SkillsAdminController returns
# 404 and SkillInjector short-circuits as a no-op — explicit-agentId clients see ZERO
# behavior change. Flip to true per-environment after burn-in to enable per-agent skill
# attachment, tool/prompt augmentation, and admin CRUD endpoints.
agm.skills.enabled=false

# REQ-DR-2 Callable Member Composition feature flag. When false (default), team member
# resolution falls back to the static agents.members list — production-default behavior
# is unchanged. When true, MemberResolver dispatches on agents.member_resolver_type
# (STATIC / ORG_TIER / FEATURE_FLAG) so a team can have its roster filtered per request
# without schema changes.
agm.member-resolver.enabled=false

# OTLP Telemetry Export (disabled by default — enable to export spans to Jaeger/Datadog/Splunk)
agentmanager.otlp.enabled=false
agentmanager.otlp.endpoint=http://localhost:4317
agentmanager.otlp.timeout-ms=5000
agentmanager.otlp.batch-size=512
agentmanager.otlp.export-interval-ms=5000
agentmanager.otlp.include-prompts=false

# MCP Configuration (Standard Sync Client)
spring.ai.mcp.client.type=SYNC

