spring.jpa.hibernate.ddl-auto=validate
spring.liquibase.enabled=true

# Comprehensive Dev Logging (Non-Invasive)
# See implementation_plan.md

# Log Framework MVC endpoint matching and request details
logging.level.web=DEBUG

# Enable Hibernate SQL logging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
# Bind trace allows seeing the actual parameters passed to SQL
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Security logging (Helps debug 401s / 403s instantly)
logging.level.org.springframework.security=DEBUG

# L-2 Fix: AES-256-GCM encryption key for outbound A2A API keys at rest.
# Dev-only key — generate production key with: openssl rand -base64 32
agm.security.outbound-key-encryption-key=Xwk/2urigyMHBxywwdkuzziew87Oh/YS1PmWIQuCSRw=

# Dev-only HS256 JWT signing secret. NEVER use this value in prod — prod profile
# requires the JWT_SECRET env var. Generate a fresh prod key with: openssl rand -base64 32
agentmanager.app.jwtSecret=dev-only-jwt-secret-do-not-use-in-production-min-32-bytes-required