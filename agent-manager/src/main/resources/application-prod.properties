# Production Profile — Activate with: --spring.profiles.active=prod

# Security: Lock down public paths (no swagger, no actuator permitAll).
# /workflows/ws is permitted here but JWT-gated at the WS handshake (JwtHandshakeInterceptor, ?token=).
app.security.public-paths=/api/auth/**,/api/v1/health/**,/error,/workflows/ws

# Security: Restrict CORS to production domain(s).
# THE VALUE BELOW IS A PLACEHOLDER — the app refuses to start if it boots in the prod
# profile with this string still in place (see WebConfig.validateCorsOriginsOrFail). Set
# app.cors.allowed-origin-patterns to your actual origin pattern(s) before deploying;
# multiple patterns can be comma-separated. Leaving this unset would expose a CORS
# allowlist for a domain anyone can register.
app.cors.allowed-origin-patterns=https://your-production-domain.com

# Actuator: Restrict exposed endpoints and require auth for details
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.show-details=when-authorized

# Logging: Production-appropriate levels
logging.level.ai.operativus.agentmanager=INFO
logging.level.org.springframework.ai=WARN

# Database: Validate schema only (Liquibase handles migrations)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# HS256 JWT signing secret — REQUIRED env var. No default in this profile, so
# Spring fails to start with a clear ${JWT_SECRET} resolution error if the env
# var is missing. JwtUtils.validateSecretOrFail() rejects the legacy hardcoded
# default literal as a second line of defense. Generate with: openssl rand -base64 32
agentmanager.app.jwtSecret=${JWT_SECRET}

# ─── Embedding-model selector (architectural fail-fast escape hatch) ───
# Spring AI 2.0's GoogleGenAi embedding auto-config eagerly fetches Application
# Default Credentials at boot, so a production deployment that doesn't use
# Google would fail-fast on container start. This default deselects the auto-
# config so the app boots without GCP credentials and falls back to
# NoOpEmbeddingModel (zero-vectors; RAG search returns noise).
#
# OPT IN to a real embedding provider:
#   SPRING_AI_MODEL_EMBEDDING=openai   + spring.ai.openai.api-key
#   SPRING_AI_MODEL_EMBEDDING=google   + GOOGLE_PROJECT_ID + GOOGLE_APPLICATION_CREDENTIALS
#   SPRING_AI_MODEL_EMBEDDING=anthropic + ... (when supported)
# When set to a real provider, the matching Spring AI auto-config registers a
# real EmbeddingModel bean which wins the priority cascade in
# ChatConfig.primaryEmbeddingModel over the NoOp fallback.
spring.ai.model.embedding=${SPRING_AI_MODEL_EMBEDDING:none}

# Explicit exclusion of the Google AI embedding auto-config — needed in
# addition to the selector above because Spring's eager bean creation tries
# to instantiate the connection-details bean even when the selector is "none"
# until the auto-config itself is excluded. Mirrors application-test.properties.
spring.autoconfigure.exclude=\
  org.springframework.ai.model.google.genai.autoconfigure.embedding.GoogleGenAiEmbeddingConnectionAutoConfiguration,\
  org.springframework.ai.model.google.genai.autoconfigure.embedding.GoogleGenAiTextEmbeddingAutoConfiguration
