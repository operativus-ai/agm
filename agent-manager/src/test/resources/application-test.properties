# Match prod: Liquibase owns the schema, Hibernate only validates.
spring.jpa.hibernate.ddl-auto=validate
spring.liquibase.enabled=true
spring.liquibase.clear-checksums=true

# Test-only HS256 JWT signing secret. Distinct from dev/demo/prod so cross-env
# token replay is impossible. JwtUtils.validateSecretOrFail() requires >= 32 bytes.
agentmanager.app.jwtSecret=test-only-jwt-secret-do-not-use-in-production-min-32-bytes-required

# BCrypt strength 4 (minimum legal value) for tests. Production uses 12 (~250ms
# per hash); paying that on every register+login in BaseIntegrationTest fixtures
# would add tens of seconds to the integration suite for zero security signal.
# matches() works across strengths because the cost is embedded in the stored hash.
agentmanager.security.bcrypt-strength=4

# Required so FakeChatModelConfig can shadow per-provider ChatModel beans
# (openAiChatModel, anthropicChatModel, googleGenAiChatModel) by bean name.
spring.main.allow-bean-definition-overriding=true

# Spring AI chat auto-configs are processed AFTER @TestConfiguration imports, so they
# would re-register the real provider ChatModel beans on top of our fake overrides
# (regardless of allow-bean-definition-overriding). Excluding the chat auto-configs
# entirely is the only deterministic way to leave FakeChatModelConfig as the sole
# source of ChatModel beans. Embedding auto-configs are left intact.
spring.autoconfigure.exclude=\
  org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration,\
  org.springframework.ai.model.anthropic.autoconfigure.AnthropicChatAutoConfiguration,\
  org.springframework.ai.model.google.genai.autoconfigure.chat.GoogleGenAiChatAutoConfiguration,\
  org.springframework.ai.model.google.genai.autoconfigure.embedding.GoogleGenAiEmbeddingConnectionAutoConfiguration,\
  org.springframework.ai.model.google.genai.autoconfigure.embedding.GoogleGenAiTextEmbeddingAutoConfiguration

# Do not let a dev's local .env leak into test runs.
spring.config.import=

# Spring Boot's auto-compose would try to start a second Postgres container — the Testcontainer
# provided by BaseIntegrationTest is the one we want.
spring.docker.compose.enabled=false

# Fake-but-non-sentinel keys so DynamicProviderInitializer registers the Spring AI beans.
# Tests that actually call an LLM must override the ChatModel bean with a stub or WireMock —
# do not let accidental real-network calls happen. The sentinel "dummy-key-to-pass-validation"
# would disable the provider, which is the wrong shape for most integration tests.
spring.ai.openai.api-key=test-openai-key
spring.ai.openai.embedding.api-key=test-openai-key
spring.ai.anthropic.api-key=test-anthropic-key
spring.ai.google.genai.api-key=test-google-key
spring.ai.google.genai.project-id=test-project

# Embedding providers are disabled in tests so FakeEmbeddingModel is the sole
# EmbeddingModel bean (and thus the one elected by ChatConfig.primaryEmbeddingModel
# + wrapped into the VectorStore). Google autoconfigs are excluded above.
#
# Spring AI 2.0 gates every provider embedding auto-config on
# spring.ai.model.embedding=<provider> (matchIfMissing=true, default "openai") —
# so just setting spring.ai.openai.embedding.enabled=false does nothing here.
# Pinning the selector to "none" skips OpenAI (and any other) embedding
# autoconfig at condition time.
spring.ai.model.embedding=none

# Quiet down startup noise in test output.
logging.level.liquibase=WARN
logging.level.org.springframework.test=WARN
logging.level.org.testcontainers=WARN

# ─── External-service side channels disabled (tests bring up Postgres only) ───
# Redis: no container in test profile; force in-memory cache and skip the health probe.
# Also disable the McpClusterEventListener PubSub container — its @Bean
# RedisMessageListenerContainer implements SmartLifecycle and opens a Redis
# connection at context start(), which fails every @SpringBootTest when Redis
# isn't provisioned (CI runners have no localhost:6379).
spring.cache.type=none
spring.data.redis.repositories.enabled=false
management.health.redis.enabled=false
agm.mcp.cluster-events.enabled=false
# No Redis container in the test profile (above), but several code paths use
# StringRedisTemplate directly (bulk-create idempotency, IdempotencyInterceptor,
# rate limiter). Lettuce's default command timeout is 60s, so each such call blocked
# the test ~60s before failing — the dominant contributor to the integration suite
# blowing past CI's timeout. Fail fast so graceful-degradation paths kick in promptly.
# Tests that genuinely exercise Redis spin up their own Testcontainer and override
# spring.data.redis.host/port (e.g. ModelRateLimitGuardDistributedRuntimeTest).
spring.data.redis.timeout=250ms
spring.data.redis.connect-timeout=250ms

# ─── Auth rate limiting effectively disabled for the harness ───
# RateLimitingFilter throttles /api/auth/register (5/min) and /api/auth/login (10/min)
# per IP. The integration harness registers + logs in users from a single IP across
# hundreds of tests via BaseIntegrationTest#authenticateAs, so it trips these limits
# constantly → 429 with Retry-After: 60s → the TestRestTemplate's Apache HttpClient
# auto-retries after 60s. That single stall accounted for ~57 x 60s of dead wait in a
# 129-class run — the dominant cost of the integration suite. Raise every limit far
# above any test's burst so the harness is never throttled (the limits themselves are
# exercised by dedicated tests that pin tighter values via @TestPropertySource).
app.rate-limit.requests-per-second=100000
app.rate-limit.login.requests-per-minute=100000
app.rate-limit.register.requests-per-minute=100000
app.rate-limit.dispatch.requests-per-minute=100000

# ─── Hikari pool sized down for test-context fan-out ───
# Spring caches up to 32 @SpringBootTest contexts per JVM, each carrying its own
# HikariCP pool. With Hikari's default max-pool-size=10 and Postgres default
# max_connections=100, the full integration suite trips "sorry, too many clients
# already" (pinned by ApprovalsRuntimeTest). A pool of 3 gives each context
# enough for serial MockMvc/TestRestTemplate traffic plus one @Async liveness
# probe, while capping peak usage at ~96 across all cached contexts.
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.connection-timeout=20000

# Don't ship telemetry off-box during tests.
management.tracing.sampling.probability=0
management.otlp.tracing.export.enabled=false
management.otlp.metrics.export.enabled=false

# Outbound email is stubbed in tests via RecordingMailService (a @Primary
# MailService recording sends to an in-memory list). The JavaMailSender bean
# still exists from Spring Mail auto-config but is never called. Disable the
# mail health indicator so /actuator/health does not try to dial smtp.invalid
# on every probe.
management.health.mail.enabled=false

# ─── Scheduler intervals pushed far out (decision 4.4) ───
# Scheduled work is exercised by direct invocation via SchedulerTestSupport, never by
# accelerating intervals. Pushing intervals to 24h prevents accidental fire mid-test.
agentmanager.scheduler.approval-sla-check-ms=86400000
agentmanager.scheduler.approval-cleanup-ms=86400000
agentmanager.scheduler.run-paused-cleanup-ms=86400000
agentmanager.scheduler.run-paused-cutoff-hours=24
agentmanager.scheduler.batch-poll-ms=86400000
agentmanager.scheduler.schedule-poll-ms=86400000
agentmanager.scheduler.memory-consolidation-ms=86400000
agentmanager.scheduler.slo-evaluation-ms=86400000
agentmanager.scheduler.swarm-cleanup-ms=86400000
agentmanager.scheduler.peer-health-ms=86400000
agentmanager.scheduler.alerting-ms=86400000
agentmanager.scheduler.alerts-retry-ms=86400000

# ─── Circuit breaker dialed down for test affordability ───
# wait-duration-open-ms=200 lets CLOSED→OPEN→HALF_OPEN transition tests finish in
# sub-second wall-clock. sliding-window-size=3 / minimum-number-of-calls=2 means a
# couple of failures are enough to trip the breaker in test fixtures. Default
# production values live in application.properties.
agent.guardrails.circuit-breaker.sliding-window-size=3
agent.guardrails.circuit-breaker.minimum-number-of-calls=2
agent.guardrails.circuit-breaker.wait-duration-open-ms=200
agent.guardrails.circuit-breaker.slow-call-duration-ms=5000

# ─── A2A outbound key encryption (test-only material) ───
# 32-byte AES-256 key, base64-encoded. Activates OutboundApiKeyConverter so the
# encryption-at-rest contract for a2a_remote_agents.outbound_api_key is exercised
# end-to-end in tests. NEVER reuse this key in any non-test environment.
agm.security.outbound-key-encryption-key=AAECAwQFBgcICQoLDA0ODxAREhMUFRYXGBkaGxwdHh8=

# ─── Knowledge ingestion SSRF guard ───
# Production default is false (block loopback/private addresses). Tests run WireMock on
# localhost so the URL-ingest happy-path tests need the loopback whitelist. The strict
# behavior is verified by KnowledgeIngestUrlSsrfRuntimeTest which pins this back to false
# via @TestPropertySource. Non-loopback rejections (cloud metadata 169.254/16, 0.0.0.0)
# always fire regardless of this flag.
agent.knowledge.ingest.allow-loopback-urls=true

# ─── Workflow webhook step SSRF guard ───
# Same pattern as KB ingest: production default false, test profile true so workflow
# step runtime tests can dispatch to a WireMock listener on localhost. Always-on
# rejections (0.0.0.0, 169.254/16 cloud metadata, non-http(s) schemes) fire regardless.
# See WebhookWorkflowStepExecutor.allowLoopback.
agent.workflow.webhook.allow-loopback-urls=true

# ─── Firecrawl scrape/crawl SSRF guard ───
# Same pattern: production default false so agent-driven scrape/crawl URLs can't reach
# internal services via Firecrawl (which shares the internal network); test profile true so
# crawler tests can target a WireMock listener on localhost. Always-on rejections
# (0.0.0.0, 169.254/16 cloud metadata, non-http(s)) fire regardless.
# See WebsiteCrawlerService.scrapeAllowLoopback.
app.firecrawl.scrape.allow-loopback-urls=true

# ─── Extension/webhook registration SSRF guard ───
# Same pattern: production default false (ExtensionController @Value default), test profile true
# so extension/webhook runtime tests can register a WireMock listener on localhost. Always-on
# rejections (0.0.0.0, 169.254/16 cloud metadata, non-http(s) schemes) fire regardless.
# See ExtensionController.rejectSsrfUrlIfPresent.
agm.extensions.ssrf.allow-loopback=true

# ─── Alert-integration webhook dispatch SSRF guard ───
# Same pattern: production default false (AlertIntegrationService @Value default), test profile true
# so alert-integration dispatch/retry runtime tests can POST to a WireMock listener on localhost.
# Dedicated strict-mode SSRF tests still pin false via @TestPropertySource. Always-on rejections fire.
agentmanager.alerts.ssrf.allow-loopback-urls=true

# ─── RAG retrieval threshold: accept-all in the test profile ───
# Production default is 0.4 (data-backed floor that drops low-relevance chunks — see application.properties).
# Tests use FakeEmbeddingModel (SHA-256 vectors: exact-match=1.0, otherwise random-sign cosine), so a
# 0.4 cosine floor is semantically meaningless and would non-deterministically drop chunks. Pin
# accept-all (0.0) so retrieval assertions stay deterministic; the 0.4 default is validated by the
# manual eval (docs/analysis/rag-similarity-threshold-eval.md) + KnowledgeServiceTest.
agent.rag.search.similarity-threshold=0.0
